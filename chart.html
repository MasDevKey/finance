<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grafik Keuangan</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="header">

<h1>📊 Grafik Keuangan</h1>

<p>Statistik Harian, Bulanan & Tahunan</p>

<div class="top-actions">

<button class="graph-btn" onclick="location.href='index.html'">

← Dashboard

</button>

</div>

</div>

<div class="box">

<div class="chart-tabs">

<button class="tab active" onclick="showChart('pie',this)">
Diagram
</button>

<button class="tab" onclick="showChart('daily',this)">
Harian
</button>

<button class="tab" onclick="showChart('monthly',this)">
Bulanan
</button>

<button class="tab" onclick="showChart('yearly',this)">
Tahunan
</button>

</div>

<canvas id="financeChart"></canvas>

</div>

<div class="cards">

<div class="card">

<h3>Total Saldo</h3>

<h2 id="balance">Rp0</h2>

</div>

<div class="card green">

<h3>Pemasukan</h3>

<h2 id="income">Rp0</h2>

</div>

<div class="card red">

<h3>Pengeluaran</h3>

<h2 id="expense">Rp0</h2>

</div>

</div>

</div>

<script src="chart.js"></script>

</body>

<script>

if(!sessionStorage.getItem("financeSession")){

location.href="login.html";

}

</script>

</html>
