<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Manager</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<script>

if(!sessionStorage.getItem("financeSession")){
    window.location.replace("login.html");
}

</script>

<div class="container">

<div class="top-actions">

    <button class="graph-btn" onclick="window.location.href='chart.html'">
        📊 Lihat Grafik
    </button>

</div>

<div class="header">
<h1>Finance Manager</h1>
<p>Kelola Keuangan - By Keyaru</p>
</div>

<div class="cards">

<div class="card">
<h3>Total Tabungan</h3>
<h2 id="balance">Rp0</h2>
</div>

<div class="card green">
<h3>Pemasukan</h3>
<h2 id="income">Rp0</h2>
</div>

<div class="card red">
<h3>Pengeluaran</h3>
<h2 id="expense">Rp0</h2>
</div>

</div>

<div class="content">

<div class="left">

<div class="box">
<h2>Tambah Transaksi</h2>

<input id="name" placeholder="Nama Transaksi">

<input
    id="amount"
    type="text"
    placeholder="Jumlah Uang">

<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<button onclick="addTransaction()">
Tambah
</button>

</div>

<div class="box">

<h2>Grafik</h2>

<canvas id="chart"></canvas>

</div>

</div>

<div class="right">

<div class="box">

<div class="history-header">

    <h2>Riwayat</h2>

    <button class="delete-all" onclick="clearHistory()">
        Hapus Semua
    </button>

</div>

<input
type="text"
id="search"
placeholder="Cari transaksi..."
onkeyup="render()">

<ul id="list"></ul>

</div>

</div>

</div>

</div>

<script src="script.js"></script>


    </div>

    <div class="box">

        <h2>🧮 Kalkulator</h2>

        <div class="calculator-box">

            <input
                type="text"
                id="calcDisplay"
                readonly
                value="0">

            <div class="calculator">

                <button class="operator" onclick="clearCalc()">AC</button>
                <button class="operator" onclick="backspace()">⌫</button>
                <button class="operator" onclick="calc('%')">%</button>
                <button class="operator" onclick="calc('/')">÷</button>

                <button onclick="calc('7')">7</button>
                <button onclick="calc('8')">8</button>
                <button onclick="calc('9')">9</button>
                <button class="operator" onclick="calc('*')">×</button>

                <button onclick="calc('4')">4</button>
                <button onclick="calc('5')">5</button>
                <button onclick="calc('6')">6</button>
                <button class="operator" onclick="calc('-')">−</button>

                <button onclick="calc('1')">1</button>
                <button onclick="calc('2')">2</button>
                <button onclick="calc('3')">3</button>
                <button class="operator" onclick="calc('+')">+</button>

                <button class="zero" onclick="calc('0')">0</button>
                <button onclick="calc('.')">.</button>
                <button class="equal" onclick="calculate()">=</button>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
